function DrillBreakdown({ drillLog }) {
  const segs = [];
  Object.entries(drillLog || {}).forEach(([cat, drills]) => {
    Object.entries(drills).forEach(([drill, mins]) => {
      if (Number(mins) > 0) segs.push({ cat, drill, mins: Number(mins) });
    });
  });
  const total = segs.reduce((s, x) => s + x.mins, 0);
  if (!total || !segs.length) return null;
  return (
    <div style={{ marginTop: 10 }}>
      <div style={{ display: "flex", height: 5, borderRadius: 3, overflow: "hidden", gap: 1 }}>
        {segs.map((seg, i) => (
          <div key={i} style={{ flex: seg.mins, background: CAT_COLORS[seg.cat] || "#475569", opacity: 0.75 }}
            title={`${seg.drill}: ${seg.mins}分`} />
        ))}

      <div style={{ display: "flex", flexWrap: "wrap", gap: "3px 10px", marginTop: 5 }}>
        {segs.map((seg, i) => (
          <span key={i} style={{ fontSize: 10, color: "#64748b", fontFamily: "'Noto Sans JP', sans-serif" }}>
            <span style={{ color: CAT_COLORS[seg.cat], marginRight: 2 }}>●</span>

          </span>
        ))}
      </div>
    </div>
  );
}

  const [view, setView] = useState("dashboard");
  const [entries, setEntries] = useState([]);

    async function loadData() {
      try {
        const [eRes, gRes] = await Promise.all([
          supabase.from('practice_entries').select('*').order('date', { ascending: false }),
          supabase.from('game_entries').select('*').order('date', { ascending: false }),
        ]);
        if (eRes.data) setEntries(eRes.data.map(dbToEntry));
        if (gRes.data) setGames(gRes.data.map(dbToGame));
      } catch(e) { console.error('Load error:', e); }
      setLoading(false);
    }
    loadData();
  }, []);

  const emptyForm = {
    date: new Date().toISOString().slice(0, 10),
    condition: 3, weight: "", totalMinutes: "", sleepHours: "", pitchSpeed: "", swingSpeed: "", sprintTime: "",

  };
  const [form, setForm] = useState(emptyForm);
  const [editingEntryId, setEditingEntryId] = useState(null);
  const [inputReturnView, setInputReturnView] = useState("dashboard");

  const emptyGame = {
    date: new Date().toISOString().slice(0, 10),
    opponent: "", venue: "", result: "win",
    score: { us: "", them: "" },
    batting:     { pa: "", ab: "", hits: "", singles: "", doubles: "", triples: "", hr: "", rbi: "", bb: "", so: "" },
    pitching:    { innings: "", bf: "", pitches: "", hits: "", runs: "", er: "", bb: "", so: "", hr: "" },
    baserunning: { scored: "", sb: "", cs: "" },
    memo: "",
  };
  const [gameForm, setGameForm] = useState(emptyGame);
  const [activeTab, setActiveTab] = useState("batting"); // batting | pitching | baserunning

  // ── Date helpers ──
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  const dayOfWeek = today.getDay(); // 0=Sun
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const weekStart = new Date(today); weekStart.setDate(today.getDate() + mondayOffset);
  const weekStartStr = weekStart.toISOString().slice(0, 10);
  const monthStr = todayStr.slice(0, 7); // "YYYY-MM"

  const thisWeekEntries  = entries.filter(e => e.date >= weekStartStr && e.date <= todayStr);
  const thisMonthEntries = entries.filter(e => e.date.startsWith(monthStr));

  // 記録日数
  const weekDays  = thisWeekEntries.length;
  const monthDays = thisMonthEntries.length;

  // コンディション
  const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));
  const latestCond     = sorted.length     ? sorted[0].condition : null;
  const latestCondDate = sorted.length     ? sorted[0].date      : null;
  const prevCond       = sorted.length > 1 ? sorted[1].condition : null;
  const prevCondDate   = sorted.length > 1 ? sorted[1].date      : null;
  const condDiff       = latestCond != null && prevCond != null ? latestCond - prevCond : null;

  // 練習時間
  const weekMins  = thisWeekEntries.reduce((s, e) => s + (Number(e.totalMinutes) || 0), 0);
  const monthMins = thisMonthEntries.reduce((s, e) => s + (Number(e.totalMinutes) || 0), 0);

  // 体重
  const wSorted        = [...entries].filter(e => e.weight).sort((a, b) => b.date.localeCompare(a.date));
  const latestWeight     = wSorted.length     ? Number(wSorted[0].weight) : null;
  const latestWeightDate = wSorted.length     ? wSorted[0].date           : null;
  const prevWeight       = wSorted.length > 1 ? Number(wSorted[1].weight) : null;
  const prevWeightDate   = wSorted.length > 1 ? wSorted[1].date           : null;
  const weightDiff       = latestWeight != null && prevWeight != null ? (latestWeight - prevWeight).toFixed(1) : null;

  // Performance records
  const pitchEntries  = [...entries].filter(e => e.pitchSpeed).sort((a,b) => b.date.localeCompare(a.date));
  const swingEntries  = [...entries].filter(e => e.swingSpeed).sort((a,b) => b.date.localeCompare(a.date));
  const sprintEntries = [...entries].filter(e => e.sprintTime).sort((a,b) => b.date.localeCompare(a.date));

  const latestPitch  = pitchEntries.length  ? { val: Number(pitchEntries[0].pitchSpeed),   date: pitchEntries[0].date  } : null;
  const latestSwing  = swingEntries.length  ? { val: Number(swingEntries[0].swingSpeed),   date: swingEntries[0].date  } : null;
  const latestSprint = sprintEntries.length ? { val: Number(sprintEntries[0].sprintTime),  date: sprintEntries[0].date } : null;

  const bestPitchRec  = pitchEntries.length  ? pitchEntries.reduce((b,e)  => Number(e.pitchSpeed)  > b.val ? {val:Number(e.pitchSpeed),  date:e.date} : b, {val:Number(pitchEntries[0].pitchSpeed),   date:pitchEntries[0].date})   : null;
  const bestSwingRec  = swingEntries.length  ? swingEntries.reduce((b,e)  => Number(e.swingSpeed)  > b.val ? {val:Number(e.swingSpeed),  date:e.date} : b, {val:Number(swingEntries[0].swingSpeed),   date:swingEntries[0].date})   : null;
  const bestSprintRec = sprintEntries.length ? sprintEntries.reduce((b,e) => Number(e.sprintTime)  < b.val ? {val:Number(e.sprintTime),  date:e.date} : b, {val:Number(sprintEntries[0].sprintTime),  date:sprintEntries[0].date})  : null;

  const recentTrend = [...entries].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 8).reverse();
  const sortedEntries = [...entries]
    .filter(e => !filterCat || (e.drillLog && e.drillLog[filterCat]))
    .sort((a, b) => b.date.localeCompare(a.date));

  function toggleCategory(cat) {
    setForm(f => {
      const dl = { ...f.drillLog };

      return { ...f, drillLog: dl };
    });

      date: e.date,
      condition: e.condition ?? 3,
      weight: e.weight ?? "",

      sleepHours: e.sleepHours ?? "",

      swingSpeed: e.swingSpeed ?? "",
      sprintTime: e.sprintTime ?? "",

      summary: e.summary || "",
      details: e.details || "",
      feeling: e.feeling ?? 3,

    setInputReturnView(returnTo);
    setEditingEntryId(entry.id);
    setForm(entryToForm(entry));
    setView("input");

    setForm(f => {
      const dl = { ...f.drillLog };

      return { ...f, drillLog: dl };

  }
  function setDrillMins(cat, drill, val) {
    setForm(f => {
      const dl = { ...f.drillLog };
      dl[cat] = { ...dl[cat], [drill]: val };
      return { ...f, drillLog: dl };
    });
  }

  async function handleSubmit() {
    const cleanLog = {};
    Object.entries(form.drillLog).forEach(([cat, drills]) => {
      const c = {};
      Object.entries(drills).forEach(([d, m]) => { if (m !== "") c[d] = Number(m) || 0; });
      if (Object.keys(c).length) cleanLog[cat] = c;
    });
    const existingForDate = entries.find(e => e.date === form.date);
    const idToUse = editingEntryId ?? existingForDate?.id ?? Date.now();

    const entry = {
      id: idToUse, date: form.date,
      condition: Number(form.condition),
      weight: form.weight !== "" ? Number(form.weight) : null,

      const ac = ce.length ? (ce.reduce((a, e) => a + e.condition, 0) / ce.length).toFixed(1) : "—";
      return { cat, count: ce.length, totalMins: tm, avgCond: ac };
    });
  }
  function getDrillStats() {
    const map = {};

      Object.entries(e.drillLog || {}).forEach(([cat, drills]) => {

          const k = `${cat}__${drill}`;
          if (!map[k]) map[k] = { cat, drill, totalMins: 0, count: 0 };
          map[k].totalMins += Number(mins) || 0;

        {/* ══════════════════════════════════════
            GAME DASHBOARD
        ══════════════════════════════════════ */}
        {view === "game_dashboard" && (() => {
          const sortedGames = [...games].sort((a,b) => b.date.localeCompare(a.date));
          const wins   = games.filter(g => g.result === "win").length;
          const losses = games.filter(g => g.result === "loss").length;
          const draws  = games.filter(g => g.result === "draw").length;
          const total  = games.length;

          // Batting cumulative
          const batGames = games.filter(g => g.batting?.ab != null);
          const totalAB  = batGames.reduce((s,g) => s + (g.batting.ab||0), 0);
          const totalH   = batGames.reduce((s,g) => s + (g.batting.hits||0), 0);
          const totalRBI = batGames.reduce((s,g) => s + (g.batting.rbi||0), 0);
          const totalHR  = batGames.reduce((s,g) => s + (g.batting.hr||0), 0);
          const totalBB  = batGames.reduce((s,g) => s + (g.batting.bb||0), 0);
          const avg = totalAB > 0 ? (totalH / totalAB).toFixed(3).replace("0.","."): ".---";
          const obp = (totalAB + totalBB) > 0 ? ((totalH + totalBB) / (totalAB + totalBB)).toFixed(3).replace("0.",".") : ".---";

          // Baserunning cumulative
          const brGames   = games.filter(g => g.baserunning);
          const totalScored = brGames.reduce((s,g) => s + (g.baserunning.scored||0), 0);
          const totalSB   = brGames.reduce((s,g) => s + (g.baserunning.sb||0), 0);
          const totalCS   = brGames.reduce((s,g) => s + (g.baserunning.cs||0), 0);
          const sbPct     = (totalSB + totalCS) > 0 ? (totalSB / (totalSB + totalCS) * 100).toFixed(0) : "—";

          // Pitching cumulative
          const pitGames  = games.filter(g => g.pitching?.pitches != null);
          const totalIP   = pitGames.reduce((s,g) => { const p = parseFloat(g.pitching.innings||0); return s + Math.floor(p) + (p%1)*10/3; }, 0);
          const totalPitH = pitGames.reduce((s,g) => s + (g.pitching.hits||0), 0);
          const totalER   = pitGames.reduce((s,g) => s + (g.pitching.er||0), 0);
          const totalK    = pitGames.reduce((s,g) => s + (g.pitching.so||0), 0);
          const totalPitBB= pitGames.reduce((s,g) => s + (g.pitching.bb||0), 0);
          const era = totalIP > 0 ? (totalER / totalIP * 9).toFixed(2) : "—";
          const whip = totalIP > 0 ? ((totalPitH + totalPitBB) / totalIP).toFixed(2) : "—";

          // Trend data (chronological)
          const chronoGames = [...games].sort((a,b) => a.date.localeCompare(b.date));

          const PCard = ({label, value, sub, color}) => (
            <div style={{ flex:1, minWidth:100, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:14, padding:"14px 16px", position:"relative", overflow:"hidden" }}>
              <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:color, borderRadius:"14px 14px 0 0" }} />
              <div style={{ fontSize:10, color:"#64748b", marginBottom:5 }}>{label}</div>
              <div style={{ fontSize:22, fontFamily:"'Oswald', sans-serif", color:"#f1f5f9", lineHeight:1 }}>{value}</div>
              {sub && <div style={{ fontSize:9, color:"#475569", marginTop:4 }}>{sub}</div>}
            </div>
          );

          return (
            <div>
              <div style={{ marginBottom:20 }}>
              <div style={{ fontFamily:"'Oswald', sans-serif", fontSize:22, letterSpacing:1, lineHeight:1 }}>G — GAME DB</div>
              <div style={{ fontSize:11, color:"#475569", marginTop:4 }}>試合成績のダッシュボード</div>
            </div>

              {/* 戦績 */}
              <div style={S.card}>
                <div style={S.secTitle}>通算成績</div>
                <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:16 }}>
                  <div style={{ flex:1, minWidth:120, textAlign:"center" }}>
                    <div style={{ fontSize:11, color:"#64748b", marginBottom:6 }}>試合数</div>
                    <div style={{ fontSize:36, fontFamily:"'Oswald', sans-serif", color:"#f1f5f9" }}>{total}</div>
                  </div>
                  <div style={{ flex:2, minWidth:200 }}>
                    <div style={{ fontSize:11, color:"#64748b", marginBottom:8 }}>勝敗</div>
                    <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <div style={{ textAlign:"center" }}>
                        <div style={{ fontSize:28, fontFamily:"'Oswald', sans-serif", color:"#22c55e" }}>{wins}</div>
                        <div style={{ fontSize:10, color:"#64748b" }}>勝</div>

                      <div style={{ fontSize:20, color:"#334155" }}>—</div>
                      <div style={{ textAlign:"center" }}>
                        <div style={{ fontSize:28, fontFamily:"'Oswald', sans-serif", color:"#ef4444" }}>{losses}</div>
                        <div style={{ fontSize:10, color:"#64748b" }}>敗</div>
                      </div>
                      {draws > 0 && <>
                        <div style={{ fontSize:20, color:"#334155" }}>—</div>
                        <div style={{ textAlign:"center" }}>
                          <div style={{ fontSize:28, fontFamily:"'Oswald', sans-serif", color:"#64748b" }}>{draws}</div>
                          <div style={{ fontSize:10, color:"#64748b" }}>引分</div>
                        </div>
                      </>}
                    </div>
                  </div>
                  {/* Win rate bar */}
                  <div style={{ flex:2, minWidth:160 }}>
                    <div style={{ fontSize:11, color:"#64748b", marginBottom:8 }}>勝率</div>
                    <div style={{ fontSize:26, fontFamily:"'Oswald', sans-serif", color:"#f1f5f9", marginBottom:6 }}>
                      {total > 0 ? (wins/total*100).toFixed(0) : "—"}<span style={{ fontSize:14, color:"#64748b" }}>%</span>
                    </div>
                    <div style={{ height:8, background:"rgba(255,255,255,0.06)", borderRadius:4, overflow:"hidden" }}>
                      <div style={{ width:`${total > 0 ? wins/total*100 : 0}%`, height:"100%", background:"linear-gradient(90deg,#22c55e,#10b981)", borderRadius:4 }} />
                    </div>
                  </div>
                </div>
              </div>

              {/* Batting stats */}

                    <PCard label="打率"   value={avg}      sub={`${totalH}安打 / ${totalAB}打数`} color="linear-gradient(90deg,#f59e0b,#f97316)" />
                    <PCard label="出塁率" value={obp}      sub={`四球 ${totalBB}`}                color="linear-gradient(90deg,#06b6d4,#3b82f6)" />
                    <PCard label="打点"   value={totalRBI} sub="RBI"                             color="linear-gradient(90deg,#22c55e,#10b981)" />
                    <PCard label="本塁打" value={totalHR}  sub="HR"                              color="linear-gradient(90deg,#ef4444,#f97316)" />
                  </div>
                </div>
              )}

              {/* Baserunning stats */}
              {brGames.length > 0 && (
                <div style={S.card}>
                  <div style={S.secTitle}>走塁成績（通算）</div>
                  <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:12 }}>
                    <PCard label="得点"     value={totalScored} sub="scored"                           color="linear-gradient(90deg,#22c55e,#10b981)" />
                    <PCard label="盗塁"     value={totalSB}     sub="SB"                               color="linear-gradient(90deg,#8b5cf6,#ec4899)" />
                    <PCard label="盗塁刺"   value={totalCS}     sub="CS"                               color="linear-gradient(90deg,#ef4444,#f97316)" />
                    <PCard label="盗塁成功率" value={sbPct === "—" ? "—" : `${sbPct}%`} sub={`${totalSB}/${totalSB+totalCS}`} color="linear-gradient(90deg,#06b6d4,#3b82f6)" />
                  </div>
                </div>
              )}

              {/* Pitching stats */}
              {pitGames.length > 0 && (
                <div style={S.card}>

                    <PCard label="WHIP"    value={whip}      sub="(H+BB)/IP"                    color="linear-gradient(90deg,#8b5cf6,#ec4899)" />
                    <PCard label="奪三振"  value={totalK}    sub="SO"                            color="linear-gradient(90deg,#f59e0b,#eab308)" />
                    <PCard label="四球"    value={totalPitBB} sub="BB"                           color="linear-gradient(90deg,#ef4444,#f97316)" />
                    <PCard label="登板数"  value={pitGames.length} sub={`${pitGames.reduce((s,g)=>s+(Number(g.pitching.pitches)||0),0)}球`} color="linear-gradient(90deg,#22c55e,#10b981)" />
                  </div>
                </div>
              )}

              {/* ── Trend graphs ── */}
              {chronoGames.length >= 2 && (
                <div style={S.card}>
                  <div style={S.secTitle}>成績推移グラフ</div>

                  {/* Batting avg trend */}
                  {batGames.length >= 2 && (() => {
                    // cumulative avg per game
                    let cumAB = 0, cumH = 0;
                    const avgTrend = chronoGames
                      .filter(g => g.batting?.ab != null)
                      .map(g => {
                        cumAB += g.batting.ab||0;
                        cumH  += g.batting.hits||0;
                        return { date: g.date, val: cumAB > 0 ? cumH/cumAB : 0, gameAvg: g.batting.ab > 0 ? g.batting.hits/g.batting.ab : 0 };
                      });
                    const H = 60;
                    const maxV = Math.max(...avgTrend.map(p => p.gameAvg), 0.5);
                    const bw = 100 / avgTrend.length;
                    return (
                      <div style={{ marginBottom:20 }}>
                        <div style={{ fontSize:9, color:"#f59e0b", letterSpacing:1, fontFamily:"'Oswald', sans-serif", marginBottom:6 }}>打率推移（試合別 / 累計）</div>
                        <div style={{ position:"relative", height: H + 20 }}>
                          <svg width="100%" height={H} style={{ display:"block", overflow:"visible" }}>
                            <line x1="0" x2="100%" y1={H} y2={H} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
                            {/* game avg bars */}
                            {avgTrend.map((p,i) => {
                              const bh = (p.gameAvg / maxV) * (H - 8);
                              return (
                                <rect key={i}
                                  x={`${i*bw + bw*0.15}%`} y={H - bh} width={`${bw*0.7}%`} height={bh}
                                  fill="#f59e0b" opacity="0.3" rx="2">
                                  <title>{`${p.date}: ${(p.gameAvg).toFixed(3).replace("0.",".")} (${chronoGames.filter(g=>g.batting?.ab!=null)[i]?.batting.hits}/${chronoGames.filter(g=>g.batting?.ab!=null)[i]?.batting.ab})`}</title>
                                </rect>
                              );
                            })}
                            {/* cumulative avg line */}
                            <polyline
                              points={avgTrend.map((p,i) => `${i*bw+bw*0.5}%,${H - (p.val/maxV)*(H-8)}`).join(" ")}
                              fill="none" stroke="#f59e0b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                            />
                            {avgTrend.map((p,i) => (
                              <circle key={i} cx={`${i*bw+bw*0.5}%`} cy={H - (p.val/maxV)*(H-8)} r="3" fill="#f59e0b"/>
                            ))}
                          </svg>
                          <div style={{ display:"flex", position:"absolute", bottom:0, left:0, right:0 }}>
                            {avgTrend.map((p,i) => (
                              <div key={i} style={{ flex:1, textAlign:"center", fontSize:7, color:"#475569", fontFamily:"'Oswald', sans-serif" }}>
                                {i===0 || i===avgTrend.length-1 ? formatDate(p.date) : ""}
                              </div>
                            ))}
                          </div>
                        </div>
                        <div style={{ display:"flex", gap:12, marginTop:4 }}>
                          <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:9, color:"#64748b" }}>
                            <span style={{ width:12, height:8, background:"rgba(245,158,11,0.3)", display:"inline-block", borderRadius:1 }}/> 試合別打率
                          </span>
                          <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:9, color:"#64748b" }}>
                            <span style={{ width:16, height:2, background:"#f59e0b", display:"inline-block", borderRadius:1 }}/> 累計打率
                          </span>
                        </div>
                      </div>
                    );
                  })()}

                  {/* ERA trend */}
                  {pitGames.length >= 2 && (() => {
                    let cumIP = 0, cumER = 0;
                    const eraTrend = chronoGames
                      .filter(g => g.pitching?.innings != null)
                      .map(g => {
                        const ip = parseFloat(g.pitching.innings||0);
                        const ipDec = Math.floor(ip) + (ip%1)*10/3;
                        cumIP += ipDec;
                        cumER += g.pitching.er||0;
                        const gameERA = ipDec > 0 ? (g.pitching.er||0)/ipDec*9 : 0;
                        const cumERA  = cumIP  > 0 ? cumER/cumIP*9 : 0;
                        return { date: g.date, gameERA, cumERA };
                      });
                    const H = 60;
                    const maxERA = Math.max(...eraTrend.map(p => p.gameERA), 9);
                    const bw = 100 / eraTrend.length;
                    return (
                      <div>
                        <div style={{ fontSize:9, color:"#06b6d4", letterSpacing:1, fontFamily:"'Oswald', sans-serif", marginBottom:6 }}>防御率推移（試合別 / 累計）</div>
                        <div style={{ position:"relative", height: H + 20 }}>
                          <svg width="100%" height={H} style={{ display:"block", overflow:"visible" }}>
                            <line x1="0" x2="100%" y1={H} y2={H} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
                            {eraTrend.map((p,i) => {
                              const bh = Math.min((p.gameERA / maxERA) * (H-8), H-4);
                              return (
                                <rect key={i}
                                  x={`${i*bw+bw*0.15}%`} y={H-bh} width={`${bw*0.7}%`} height={bh}
                                  fill="#06b6d4" opacity="0.25" rx="2">
                                  <title>{`${p.date}: ERA ${p.gameERA.toFixed(2)}`}</title>
                                </rect>
                              );
                            })}
                            <polyline
                              points={eraTrend.map((p,i) => `${i*bw+bw*0.5}%,${H - Math.min(p.cumERA/maxERA,1)*(H-8)}`).join(" ")}
                              fill="none" stroke="#06b6d4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                            />
                            {eraTrend.map((p,i) => (
                              <circle key={i} cx={`${i*bw+bw*0.5}%`} cy={H - Math.min(p.cumERA/maxERA,1)*(H-8)} r="3" fill="#06b6d4"/>
                            ))}
                          </svg>
                          <div style={{ display:"flex", position:"absolute", bottom:0, left:0, right:0 }}>
                            {eraTrend.map((p,i) => (
                              <div key={i} style={{ flex:1, textAlign:"center", fontSize:7, color:"#475569", fontFamily:"'Oswald', sans-serif" }}>
                                {i===0 || i===eraTrend.length-1 ? formatDate(p.date) : ""}
                              </div>
                            ))}
                          </div>
                        </div>
                        <div style={{ display:"flex", gap:12, marginTop:4 }}>
                          <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:9, color:"#64748b" }}>
                            <span style={{ width:12, height:8, background:"rgba(6,182,212,0.25)", display:"inline-block", borderRadius:1 }}/> 試合別防御率
                          </span>
                          <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:9, color:"#64748b" }}>
                            <span style={{ width:16, height:2, background:"#06b6d4", display:"inline-block", borderRadius:1 }}/> 累計防御率
                          </span>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}

              {/* Recent games */}
              <div style={S.card}>
                <div style={S.secTitle}>直近の試合</div>
                {sortedGames.slice(0, 5).map(g => (
                  <div key={g.id}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 0", borderBottom:"1px solid rgba(255,255,255,0.05)", cursor:"pointer", flexWrap:"wrap" }}
                    onClick={() => { setSelectedGame(g); setView("game_log"); }}
                  >
                    <div style={{
                      width:32, height:32, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center",
                      background: g.result==="win" ? "rgba(34,197,94,0.15)" : g.result==="loss" ? "rgba(239,68,68,0.15)" : "rgba(100,116,139,0.15)",
                      fontSize:11, fontFamily:"'Oswald', sans-serif", flexShrink:0,
                      color: g.result==="win" ? "#22c55e" : g.result==="loss" ? "#ef4444" : "#64748b",
                    }}>
                      {g.result==="win" ? "勝" : g.result==="loss" ? "敗" : "分"}
                    </div>
                    <div style={{ flex:1, minWidth:120 }}>
                      <div style={{ fontSize:13, color:"#f1f5f9" }}>{g.opponent}</div>
                      <div style={{ fontSize:10, color:"#475569" }}>{g.date} {g.venue && `@ ${g.venue}`}</div>
                    </div>
                    <div style={{ fontFamily:"'Oswald', sans-serif", fontSize:18, color:"#f1f5f9" }}>
                      {g.score.us} <span style={{ fontSize:12, color:"#475569" }}>–</span> {g.score.them}
                    </div>
                    {g.batting?.ab != null && (
                      <div style={{ fontSize:10, color:"#64748b", minWidth:80, textAlign:"right" }}>
                        {g.batting.hits}/{g.batting.ab} {g.batting.hr > 0 ? `${g.batting.hr}HR ` : ""}{g.batting.rbi}打点
                        {g.baserunning?.scored != null ? ` ${g.baserunning.scored}得点` : ""}
                      </div>
                    )}
                    {g.pitching?.innings && (
                      <div style={{ fontSize:10, color:"#64748b", minWidth:80, textAlign:"right" }}>
                        {g.pitching.innings}回 {g.pitching.er}自責 {g.pitching.so}K
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        {/* ══════════════════════════════════════
            GAME LOG
        ══════════════════════════════════════ */}
        {view === "game_log" && (
          <div>
            <div style={{ marginBottom:20 }}>
              <div style={{ fontFamily:"'Oswald', sans-serif", fontSize:22, letterSpacing:1, lineHeight:1 }}>G — GAME LOG</div>
              <div style={{ fontSize:11, color:"#475569", marginTop:4 }}>試合記録の一覧</div>
            </div>
            {[...games].sort((a,b) => b.date.localeCompare(a.date)).map(g => (
              <div key={g.id}
                style={{
                  ...S.card, cursor:"pointer",
                  border: selectedGame?.id === g.id ? "1px solid rgba(245,158,11,0.5)" : "1px solid rgba(255,255,255,0.07)",
                  transition:"border 0.2s",
                }}
                onClick={() => setSelectedGame(selectedGame?.id === g.id ? null : g)}
              >
                {/* Header */}
                <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                  <div style={{
                    width:36, height:36, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center",
                    background: g.result==="win" ? "rgba(34,197,94,0.18)" : g.result==="loss" ? "rgba(239,68,68,0.18)" : "rgba(100,116,139,0.15)",
                    fontSize:13, fontFamily:"'Oswald', sans-serif", flexShrink:0,
                    color: g.result==="win" ? "#22c55e" : g.result==="loss" ? "#ef4444" : "#64748b",
                    border: `1px solid ${g.result==="win" ? "rgba(34,197,94,0.3)" : g.result==="loss" ? "rgba(239,68,68,0.3)" : "rgba(100,116,139,0.2)"}`,
                  }}>
                    {g.result==="win" ? "勝" : g.result==="loss" ? "敗" : "分"}
                  </div>
                  <div>
                    <div style={{ fontSize:15, fontFamily:"'Oswald', sans-serif", color:"#f1f5f9" }}>vs {g.opponent}</div>
                    <div style={{ fontSize:10, color:"#475569" }}>{g.date}{g.venue ? ` @ ${g.venue}` : ""}</div>
                  </div>
                  <div style={{ fontFamily:"'Oswald', sans-serif", fontSize:24, color:"#f1f5f9", marginLeft:8 }}>
                    {g.score.us}
                    <span style={{ fontSize:14, color:"#475569", margin:"0 6px" }}>–</span>
                    {g.score.them}
                  </div>
                  <div style={{ marginLeft:"auto", display:"flex", gap:12, flexWrap:"wrap" }}>
                    {g.batting?.ab != null && (
                      <span style={{ fontSize:11, color:"#f59e0b" }}>
                        🏏 {g.batting.hits}/{g.batting.ab}
                        {g.batting.hr > 0 && ` ${g.batting.hr}HR`}
                        {` ${g.batting.rbi}打点`}
                        {g.baserunning?.scored != null && ` ${g.baserunning.scored}得点`}
                      </span>
                    )}
                    {g.pitching?.innings && (
                      <span style={{ fontSize:11, color:"#06b6d4" }}>
                        ⚾ {g.pitching.innings}回 {g.pitching.er}自責 {g.pitching.so}K
                      </span>
                    )}
                  </div>
                </div>

                {/* Expanded */}
                {selectedGame?.id === g.id && (
                  <div style={{ marginTop:14, paddingTop:14, borderTop:"1px solid rgba(255,255,255,0.06)", animation:"fadeIn 0.25s ease" }}>
                    <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>

                      {/* Batting detail */}
                      {g.batting?.ab != null && (
                        <div style={{ flex:1, minWidth:200 }}>
                          <div style={{ fontSize:10, color:"#f59e0b", fontFamily:"'Oswald', sans-serif", letterSpacing:1, marginBottom:8 }}>BATTING</div>
                          <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:6 }}>
                            {[["打席",g.batting.pa],["打数",g.batting.ab],["安打",g.batting.hits],["打点",g.batting.rbi],
                              ["本塁打",g.batting.hr],["三振",g.batting.so],["四球",g.batting.bb],["盗塁",g.batting.sb]].map(([lbl,val])=>(
                              <div key={lbl} style={{ background:"rgba(245,158,11,0.07)", borderRadius:8, padding:"6px 8px", textAlign:"center" }}>
                                <div style={{ fontSize:9, color:"#64748b", marginBottom:2 }}>{lbl}</div>
                                <div style={{ fontSize:15, fontFamily:"'Oswald', sans-serif", color:"#f1f5f9" }}>{val ?? "—"}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Pitching detail */}
                      {g.pitching?.innings && (
                        <div style={{ flex:1, minWidth:200 }}>
                          <div style={{ fontSize:10, color:"#06b6d4", fontFamily:"'Oswald', sans-serif", letterSpacing:1, marginBottom:8 }}>PITCHING</div>
                          <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:6 }}>
                            {[["投球回",g.pitching.innings],["球数",g.pitching.pitches],["被安打",g.pitching.hits],["奪三振",g.pitching.so],
                              ["失点",g.pitching.runs],["自責点",g.pitching.er],["四球",g.pitching.bb],["本塁打",g.pitching.hr]].map(([lbl,val])=>(
                              <div key={lbl} style={{ background:"rgba(6,182,212,0.07)", borderRadius:8, padding:"6px 8px", textAlign:"center" }}>
                                <div style={{ fontSize:9, color:"#64748b", marginBottom:2 }}>{lbl}</div>
                                <div style={{ fontSize:15, fontFamily:"'Oswald', sans-serif", color:"#f1f5f9" }}>{val ?? "—"}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>

                    
                    {g.baserunning && (
                      <div style={{ marginTop:12 }}>
                        <div style={{ fontSize:10, color:"#22c55e", fontFamily:"'Oswald', sans-serif", letterSpacing:1, marginBottom:6 }}>BASERUNNING</div>
                        <div style={{ display:"flex", gap:8 }}>
                          {[["得点",g.baserunning.scored],["盗塁",g.baserunning.sb],["盗塁刺",g.baserunning.cs]].map(([lbl,val])=>(
                            <span key={lbl} style={{ fontSize:12, padding:"3px 12px", borderRadius:20, background:"rgba(34,197,94,0.1)", border:"1px solid rgba(34,197,94,0.2)", color:"#86efac" }}>
                              {lbl} <span style={{ fontFamily:"'Oswald', sans-serif", color:"#22c55e" }}>{val ?? "—"}</span>
                            </span>
                          ))}
                        </div>
                      </div>
                    )}

                    {g.memo && (
                      <div style={{ marginTop:12, fontSize:12, color:"#94a3b8", lineHeight:1.8, borderTop:"1px solid rgba(255,255,255,0.05)", paddingTop:10 }}>
                        {g.memo}
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
            {games.length === 0 && (
              <div style={{ ...S.card, textAlign:"center", color:"#475569", padding:60 }}>
                試合記録がありません。「＋ 試合」から記録を追加してください。
              </div>
            )}
          </div>
        )}

        {/* ══════════════════════════════════════
            GAME INPUT FORM
        ══════════════════════════════════════ */}
        {view === "game_input" && (
          <div>
            <div style={{ marginBottom:20 }}>
              <div style={{ fontFamily:"'Oswald', sans-serif", fontSize:22, letterSpacing:1, lineHeight:1 }}>G — NEW GAME</div>
              <div style={{ fontSize:11, color:"#475569", marginTop:4 }}>試合記録の入力フォーム</div>
            </div>
            <div style={S.card}>

              {/* 基本情報 */}
              <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:20 }}>
                <div style={{ flex:2, minWidth:140 }}>
                  <label style={S.lbl}>日付</label>
                  <input type="date" value={gameForm.date}
                    onChange={e => setGameForm(f=>({...f, date:e.target.value}))} style={S.inp} />
                </div>
                <div style={{ flex:2, minWidth:140 }}>
                  <label style={S.lbl}>対戦相手</label>
                  <input type="text" value={gameForm.opponent} placeholder="第一中学校"
                    onChange={e => setGameForm(f=>({...f, opponent:e.target.value}))} style={S.inp} />
                </div>
                <div style={{ flex:2, minWidth:140 }}>
                  <label style={S.lbl}>球場・会場</label>
                  <input type="text" value={gameForm.venue} placeholder="市営球場"
                    onChange={e => setGameForm(f=>({...f, venue:e.target.value}))} style={S.inp} />
                </div>
              </div>

              {/* スコア・結果 */}
              <div style={{ marginBottom:20 }}>
                <label style={S.lbl}>スコア・結果</label>
                <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                  <input type="number" min="0" value={gameForm.score.us} placeholder="自チーム"
                    onChange={e => setGameForm(f=>({...f, score:{...f.score, us:e.target.value}}))}
                    style={{ ...S.inp, width:90, textAlign:"center", fontSize:20, fontFamily:"'Oswald', sans-serif" }} />
                  <span style={{ color:"#475569", fontSize:18 }}>–</span>
                  <input type="number" min="0" value={gameForm.score.them} placeholder="相手"
                    onChange={e => setGameForm(f=>({...f, score:{...f.score, them:e.target.value}}))}
                    style={{ ...S.inp, width:90, textAlign:"center", fontSize:20, fontFamily:"'Oswald', sans-serif" }} />
                  <div style={{ display:"flex", gap:8 }}>
                    {[["win","勝","#22c55e"],["loss","敗","#ef4444"],["draw","引分","#64748b"]].map(([v,l,c])=>(
                      <button key={v} onClick={()=>setGameForm(f=>({...f,result:v}))} style={{
                        padding:"8px 16px", borderRadius:10, border:"none",
                        background: gameForm.result===v ? `${c}25` : "rgba(255,255,255,0.04)",
                        color: gameForm.result===v ? c : "#475569",
                        outline: gameForm.result===v ? `1.5px solid ${c}50` : "1px solid rgba(255,255,255,0.08)",
                        cursor:"pointer", fontSize:13, fontFamily:"'Noto Sans JP', sans-serif",
                        fontWeight: gameForm.result===v ? 700 : 400, transition:"all 0.2s",
                      }}>{l}</button>
                    ))}
                  </div>
                </div>
              </div>

              {/* Tab selector */}
              <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                {[["batting","打撃成績","#f59e0b"],["pitching","投球成績","#06b6d4"],["baserunning","走塁","#22c55e"]].map(([t,l,c])=>(
                  <button key={t} onClick={()=>setActiveTab(t)} style={{
                    padding:"7px 18px", borderRadius:10, border:"none",
                    background: activeTab===t ? `${c}20` : "rgba(255,255,255,0.04)",
                    color: activeTab===t ? c : "#64748b",
                    outline: activeTab===t ? `1.5px solid ${c}45` : "1px solid rgba(255,255,255,0.08)",
                    cursor:"pointer", fontSize:13, fontFamily:"'Noto Sans JP', sans-serif",
                    fontWeight: activeTab===t ? 700 : 400, transition:"all 0.2s",
                  }}>{l}</button>
                ))}
              </div>

              {/* Batting tab */}
              {activeTab === "batting" && (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(110px,1fr))", gap:12, marginBottom:20 }}>
                  {[["pa","打席"],["ab","打数"],["hits","安打"],["singles","単打"],["doubles","二塁打"],
                    ["triples","三塁打"],["hr","本塁打"],["rbi","打点"],["bb","四球"],["so","三振"],["sb","盗塁"]].map(([k,l])=>(
                    <div key={k}>
                      <label style={{ ...S.lbl, marginBottom:4 }}>{l}</label>
                      <input type="number" min="0" value={gameForm.batting[k]}
                        onChange={e => setGameForm(f=>({...f, batting:{...f.batting,[k]:e.target.value}}))}
                        style={{ ...S.inp, textAlign:"center", fontFamily:"'Oswald', sans-serif", fontSize:18 }} />
                    </div>
                  ))}
                </div>
              )}

              {/* Pitching tab */}
              {activeTab === "pitching" && (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(110px,1fr))", gap:12, marginBottom:20 }}>
                  {[["innings","投球回"],["bf","打者数"],["pitches","球数"],["hits","被安打"],
                    ["runs","失点"],["er","自責点"],["bb","四球"],["so","奪三振"],["hr","被本塁打"]].map(([k,l])=>(
                    <div key={k}>
                      <label style={{ ...S.lbl, marginBottom:4 }}>{l}</label>
                      <input type={k==="innings"?"text":"number"} min="0"
                        value={gameForm.pitching[k]}
                        placeholder={k==="innings"?"6.0":""}
                        onChange={e => setGameForm(f=>({...f, pitching:{...f.pitching,[k]:e.target.value}}))}
                        style={{ ...S.inp, textAlign:"center", fontFamily:"'Oswald', sans-serif", fontSize:18 }} />
                    </div>
                  ))}
                </div>
              )}

              {/* Baserunning tab */}
              {activeTab === "baserunning" && (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(110px,1fr))", gap:12, marginBottom:20 }}>
                  {[["scored","得点"],["sb","盗塁"],["cs","盗塁刺"]].map(([k,l])=>(
                    <div key={k}>
                      <label style={{ ...S.lbl, marginBottom:4 }}>{l}</label>
                      <input type="number" min="0" value={gameForm.baserunning[k]}
                        onChange={e => setGameForm(f=>({...f, baserunning:{...f.baserunning,[k]:e.target.value}}))}
                        style={{ ...S.inp, textAlign:"center", fontFamily:"'Oswald', sans-serif", fontSize:18 }} />
                    </div>
                  ))}
                </div>
              )}

              {/* Memo */}
              <div style={{ marginBottom:24 }}>
                <label style={S.lbl}>メモ・振り返り</label>
                <textarea value={gameForm.memo} rows={3}
                  onChange={e => setGameForm(f=>({...f, memo:e.target.value}))}
                  placeholder="試合の感想、課題、よかった点など..."
                  style={{ ...S.inp, resize:"vertical", lineHeight:1.7 }} />
              </div>

              {/* Submit */}
              <div style={{ display:"flex", gap:12 }}>
                <button onClick={handleGameSubmit} style={{
                  flex:1, padding:"14px 0", borderRadius:12, border:"none",
                  background:"linear-gradient(135deg,#f59e0b,#ef4444)",
                  color:"#fff", fontSize:15, fontFamily:"'Noto Sans JP', sans-serif",
                  fontWeight:700, cursor:"pointer", boxShadow:"0 0 22px rgba(245,158,11,0.28)",
                }}>試合記録を保存する</button>
                <button onClick={() => setView("game_dashboard")} style={{
                  padding:"14px 20px", borderRadius:12, border:"1px solid rgba(255,255,255,0.12)",
                  background:"transparent", color:"#64748b", fontSize:15,
                  fontFamily:"'Noto Sans JP', sans-serif", cursor:"pointer",
                }}>キャンセル</button>
              </div>
            </div>
          </div>
        )}

      </main>


    </div>
  );
}


function App() {
  return <BaseballTracker />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
